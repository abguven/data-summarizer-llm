name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t data-summarizer:ci .

      - name: Run functional tests
        run: bash tests/run_tests.sh data-summarizer:ci
