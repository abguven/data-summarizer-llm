name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker build --build-arg APP_VERSION=$VERSION -t data-summarizer:release .

      - name: Run functional tests
        run: bash tests/run_tests.sh data-summarizer:release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker tag data-summarizer:release abguven/data-summarizer:$VERSION
          docker tag data-summarizer:release abguven/data-summarizer:latest
          docker push abguven/data-summarizer:$VERSION
          docker push abguven/data-summarizer:latest
